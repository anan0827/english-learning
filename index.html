<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>英语学习 - IELTS Prep</title>
<style>
/* ═══════════════════════════════════════════
   CSS Reset & Variables
   ═══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7fc; --bg-card:#fff; --text:#2d2a3a; --text2:#6b6880;
  --pri:#6c5ce7; --pri2:#a29bfe; --pri-light:#f0eeff;
  --accent:#fd79a8; --accent-light:#ffeef5;
  --success:#00b894; --warn:#fdcb6e; --danger:#e17055;
  --border:#e8e6f0; --shadow:0 2px 12px rgba(108,92,231,0.08);
  --radius:14px; --radius-sm:10px;
  --nav-h:64px; --tab-h:62px;
  --font:system-ui,-apple-system,'Segoe UI',sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#12101b; --bg-card:#1c1a2b; --text:#e8e6f0; --text2:#9b98b0;
    --pri:#a29bfe; --pri2:#6c5ce7; --pri-light:#1f1c35;
    --accent:#fd79a8; --accent-light:#2d1a28;
    --border:#2d2a3d; --shadow:0 2px 12px rgba(0,0,0,0.25);
  }
}
html{font-size:16px} body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;padding-bottom:calc(var(--tab-h) + env(safe-area-inset-bottom, 0px))}
/* ═══════════════════════════════════════════
   Layout
   ═══════════════════════════════════════════ */
.app{max-width:600px;margin:0 auto;padding:20px 16px 0}
header{text-align:center;padding:24px 0 12px}
header h1{font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,var(--pri),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header .sub{font-size:.82rem;color:var(--text2);margin-top:2px}
.page{display:none;animation:fadeIn .25s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* ═══════════════════════════════════════════
   Bottom Tab Bar
   ═══════════════════════════════════════════ */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg-card);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom, 0)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;border:none;background:none;color:var(--text2);font-size:.68rem;cursor:pointer;transition:color .2s;gap:3px;min-height:var(--tab-h)}
.tab-btn .ico{font-size:1.3rem;line-height:1}
.tab-btn.active{color:var(--pri)}
.tab-btn .badge{position:absolute;top:4px;right:50%;transform:translateX(18px);background:var(--danger);color:#fff;font-size:.6rem;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.tab-btn{position:relative}
/* ═══════════════════════════════════════════
   Dashboard Cards
   ═══════════════════════════════════════════ */
.card{background:var(--bg-card);border-radius:var(--radius);padding:18px 16px;box-shadow:var(--shadow);margin-bottom:14px;border:1px solid var(--border)}
.card-row{display:flex;gap:12px;margin-bottom:14px}
.card-row .card{flex:1;margin-bottom:0}
.stat-num{font-size:2rem;font-weight:800;color:var(--pri)}
.stat-label{font-size:.75rem;color:var(--text2);margin-top:2px}
.progress-bar{height:10px;background:var(--border);border-radius:5px;overflow:hidden;margin:10px 0 6px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--pri),var(--accent));border-radius:5px;transition:width .5s ease}
.level-badge{display:inline-block;background:var(--pri-light);color:var(--pri);padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:600}
.xp-row{display:flex;justify-content:space-between;align-items:center;font-size:.78rem;color:var(--text2)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:var(--radius-sm);font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-pri{background:var(--pri);color:#fff}
.btn-pri:hover{background:var(--pri2);transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--pri);border:2px solid var(--pri)}
.btn-sm{padding:6px 14px;font-size:.78rem}
.btn-block{width:100%;justify-content:center}
.btn:active{transform:scale(.97)}
/* ═══════════════════════════════════════════
   Phonetics
   ═══════════════════════════════════════════ */
.section-title{font-size:1rem;font-weight:700;margin:16px 0 10px;padding-left:4px}
.phoneme-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:8px}
.phoneme-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 6px;text-align:center;cursor:pointer;transition:all .2s;user-select:none}
.phoneme-card:active{transform:scale(.93);background:var(--pri-light);border-color:var(--pri2)}
.phoneme-card .sym{font-size:1.15rem;font-weight:600;font-family:'Georgia','Times New Roman',serif}
.phoneme-card .ex{font-size:.65rem;color:var(--text2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.phoneme-card.playing{background:var(--pri-light);border-color:var(--pri);animation:pulse .6s ease}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(108,92,231,.4)}50%{box-shadow:0 0 0 12px rgba(108,92,231,0)}}
/* ═══════════════════════════════════════════
   Vocabulary
   ═══════════════════════════════════════════ */
.cat-scroll{display:flex;gap:8px;overflow-x:auto;padding:4px 0 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-chip{flex-shrink:0;padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--bg-card);font-size:.78rem;cursor:pointer;white-space:nowrap;transition:all .2s}
.cat-chip.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.word-card{display:flex;align-items:center;padding:14px;background:var(--bg-card);border-radius:var(--radius-sm);margin-bottom:8px;border:1px solid var(--border);gap:12px;cursor:pointer;transition:all .15s}
.word-card:active{background:var(--pri-light)}
.word-card .eng{font-weight:600;font-size:.95rem;min-width:80px}
.word-card .phon{font-size:.7rem;color:var(--text2);font-family:Georgia,serif}
.word-card .chn{font-size:.82rem;color:var(--text2);margin-left:auto;text-align:right}
.word-card .spk{font-size:1.1rem;opacity:.5;flex-shrink:0}
.word-card .added{color:var(--success);font-size:.7rem;flex-shrink:0}
/* ═══════════════════════════════════════════
   Lessons
   ═══════════════════════════════════════════ */
.level-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.level-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem}
.level-icon.locked{background:var(--border);opacity:.5}
.level-icon.done{background:var(--success);color:#fff}
.level-icon.current{background:var(--pri-light);color:var(--pri)}
.lesson-item{display:flex;align-items:center;padding:14px;background:var(--bg-card);border-radius:var(--radius-sm);margin-bottom:8px;border:1px solid var(--border);cursor:pointer;transition:all .15s;gap:12px}
.lesson-item:active{background:var(--pri-light)}
.lesson-item.locked{opacity:.5;cursor:not-allowed}
.lesson-item .idx{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;flex-shrink:0}
.lesson-item .idx.done{background:var(--success);color:#fff}
.lesson-item .idx.current{background:var(--pri);color:#fff}
.lesson-item .idx.locked{background:var(--border);color:var(--text2)}
.lesson-item .info{flex:1}
.lesson-item .info .title{font-size:.9rem;font-weight:600}
.lesson-item .info .desc{font-size:.72rem;color:var(--text2)}
.lesson-content{line-height:1.8;font-size:.9rem}
.lesson-content h3{font-size:1.05rem;margin:16px 0 8px;color:var(--pri)}
.lesson-content .example{background:var(--pri-light);padding:12px 14px;border-radius:var(--radius-sm);margin:8px 0;cursor:pointer}
.lesson-content .example .en{font-weight:600;font-size:.92rem}
.lesson-content .example .zh{font-size:.78rem;color:var(--text2);margin-top:2px}
/* ═══════════════════════════════════════════
   Review
   ═══════════════════════════════════════════ */
.flashcard{background:var(--bg-card);border-radius:var(--radius);padding:40px 20px;text-align:center;cursor:pointer;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:var(--shadow);border:1px solid var(--border);transition:transform .4s;user-select:none}
.flashcard.flipped{transform:rotateY(180deg)}
.flashcard .front,.flashcard .back{backface-visibility:hidden}
.flashcard .word{font-size:2rem;font-weight:700}
.flashcard .phonetic{font-size:.9rem;color:var(--text2);margin-top:6px;font-family:Georgia,serif}
.flashcard .hint{font-size:.75rem;color:var(--text2);margin-top:16px;opacity:.6}
.flashcard .meaning{font-size:1.3rem;font-weight:600;color:var(--pri)}
.flashcard .example-sent{font-size:.82rem;color:var(--text2);margin-top:10px;font-style:italic}
.rating-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px}
.rating-btn{padding:12px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-card);cursor:pointer;font-size:.75rem;text-align:center;transition:all .15s}
.rating-btn:active{transform:scale(.95)}
.rating-btn.r0:hover{background:#ffeaea;border-color:var(--danger)}
.rating-btn.r1:hover{background:#fff8e1;border-color:var(--warn)}
.rating-btn.r2:hover{background:#e8f8f5;border-color:var(--success)}
.rating-btn.r3:hover{background:#e8f0ff;border-color:var(--pri)}
.rating-btn .emoji{font-size:1.2rem;display:block}
/* ═══════════════════════════════════════════
   Quiz
   ═══════════════════════════════════════════ */
.quiz-type-tabs{display:flex;gap:8px;margin-bottom:16px}
.quiz-type-btn{flex:1;padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-card);text-align:center;cursor:pointer;font-size:.78rem;transition:all .15s}
.quiz-type-btn.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.quiz-card{background:var(--bg-card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1px solid var(--border)}
.quiz-card .question{font-size:1.1rem;font-weight:600;margin-bottom:16px}
.quiz-options{display:flex;flex-direction:column;gap:8px}
.quiz-opt{padding:14px;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;font-size:.9rem;text-align:center}
.quiz-opt:active{transform:scale(.98)}
.quiz-opt.correct{border-color:var(--success);background:#e8f8f5}
.quiz-opt.wrong{border-color:var(--danger);background:#ffeaea}
.quiz-input{width:100%;padding:14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:1rem;text-align:center;background:var(--bg);color:var(--text);outline:none}
.quiz-input:focus{border-color:var(--pri)}
.quiz-score{text-align:center;font-size:1.5rem;font-weight:800;color:var(--pri);margin:8px 0}
/* ═══════════════════════════════════════════
   Modal / Lesson View
   ═══════════════════════════════════════════ */
.modal-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;display:none}
.modal-overlay.active{display:block}
.modal-header{position:sticky;top:0;background:var(--bg);padding:16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);z-index:10}
.modal-header .back-btn{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--pri);padding:4px}
.modal-body{padding:16px;max-width:600px;margin:0 auto}
.lesson-quiz{margin-top:20px;padding:16px;background:var(--pri-light);border-radius:var(--radius)}
.lesson-quiz .q-title{font-weight:700;margin-bottom:10px;font-size:.9rem}
.lesson-quiz .q-opt{padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer;background:var(--bg-card);font-size:.85rem}
.lesson-quiz .q-opt.correct{background:#d4edda;border-color:var(--success)}
.lesson-quiz .q-opt.wrong{background:#f8d7da;border-color:var(--danger)}
/* ═══════════════════════════════════════════
   Toast
   ═══════════════════════════════════════════ */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--pri);color:#fff;padding:10px 22px;border-radius:24px;font-size:.85rem;font-weight:600;z-index:300;animation:toastIn .3s ease,toastOut .3s ease 1.5s forwards;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-state .emoji{font-size:3rem;margin-bottom:12px}
</style>
</head>
<body>

<div class="app" id="app">
  <header>
    <h1>📚 英语学习</h1>
    <div class="sub">Step by Step → IELTS</div>
  </header>

  <!-- ═══ PAGE: Home ═══ -->
  <div class="page active" id="page-home">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div class="stat-label">当前等级</div>
          <div class="level-badge" id="home-level">入门新手 Lv.1</div>
        </div>
        <div style="text-align:right">
          <div class="stat-label">连续学习</div>
          <div class="stat-num" id="home-streak" style="font-size:1.5rem">0 天</div>
        </div>
      </div>
      <div class="progress-bar" style="margin-top:14px"><div class="progress-fill" id="home-progress" style="width:0%"></div></div>
      <div class="xp-row"><span>🏆 <span id="home-xp">0</span> XP</span><span>下一个等级: <span id="home-next">200 XP</span></span></div>
    </div>

    <div class="card-row">
      <div class="card" style="text-align:center">
        <div class="stat-num" id="home-due" style="font-size:1.4rem">0</div>
        <div class="stat-label">今日待复习</div>
      </div>
      <div class="card" style="text-align:center">
        <div class="stat-num" id="home-words" style="font-size:1.4rem">0</div>
        <div class="stat-label">已学单词</div>
      </div>
      <div class="card" style="text-align:center">
        <div class="stat-num" id="home-lessons" style="font-size:1.4rem">0</div>
        <div class="stat-label">完成课程</div>
      </div>
    </div>

    <button class="btn btn-pri btn-block" onclick="app.navTo('review')" style="margin-bottom:10px">📝 开始今日复习</button>
    <button class="btn btn-outline btn-block" onclick="app.navTo('lessons')">📖 继续学习课程</button>
  </div>

  <!-- ═══ PAGE: Phonetics ═══ -->
  <div class="page" id="page-phonetics">
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <button class="btn btn-sm btn-pri" onclick="app.showPhonetics('all')" id="pho-btn-all">全部</button>
      <button class="btn btn-sm btn-outline" onclick="app.showPhonetics('practice')" id="pho-btn-practice">🎯 练习模式</button>
    </div>
    <div id="phonetics-content"></div>
    <div id="phonetics-practice" style="display:none"></div>
  </div>

  <!-- ═══ PAGE: Vocabulary ═══ -->
  <div class="page" id="page-vocabulary">
    <div class="cat-scroll" id="vocab-cats"></div>
    <div id="vocab-words"></div>
  </div>

  <!-- ═══ PAGE: Lessons ═══ -->
  <div class="page" id="page-lessons">
    <div id="lessons-list"></div>
  </div>

  <!-- ═══ PAGE: Review ═══ -->
  <div class="page" id="page-review">
    <div id="review-content"></div>
  </div>

  <!-- ═══ PAGE: Quiz ═══ -->
  <div class="page" id="page-quiz">
    <div class="quiz-type-tabs">
      <button class="quiz-type-btn active" onclick="app.quizMode='match';app.startQuiz()">🔤 释义匹配</button>
      <button class="quiz-type-btn" onclick="app.quizMode='listen';app.startQuiz()">👂 听音拼写</button>
      <button class="quiz-type-btn" onclick="app.quizMode='fill';app.startQuiz()">✏️ 选词填空</button>
    </div>
    <div id="quiz-content"></div>
  </div>
</div>

<!-- ═══ Bottom Tab Bar ═══ -->
<nav class="tab-bar" id="tab-bar">
  <button class="tab-btn active" data-page="home"><span class="ico">🏠</span>首页</button>
  <button class="tab-btn" data-page="phonetics"><span class="ico">🎵</span>音标</button>
  <button class="tab-btn" data-page="vocabulary"><span class="ico">📚</span>单词</button>
  <button class="tab-btn" data-page="lessons"><span class="ico">📖</span>课程</button>
  <button class="tab-btn" data-page="review"><span class="ico">📝</span>复习<span class="badge" id="review-badge" style="display:none">0</span></button>
  <button class="tab-btn" data-page="quiz"><span class="ico">🎯</span>测试</button>
</nav>

<!-- ═══ Lesson Modal ═══ -->
<div class="modal-overlay" id="lesson-modal">
  <div class="modal-header">
    <button class="back-btn" onclick="app.closeLesson()">←</button>
    <span style="font-weight:700" id="modal-title">课程</span>
  </div>
  <div class="modal-body" id="modal-body"></div>
</div>

<script>
/* ═══════════════════════════════════════════
   DATA: Phonetics (44 phonemes)
   ═══════════════════════════════════════════ */
const PHONEMES = {
  shortVowels: [
    {sym:'/ɪ/', ex:'sit', word:'sit'},
    {sym:'/e/', ex:'bed', word:'bed'},
    {sym:'/æ/', ex:'cat', word:'cat'},
    {sym:'/ʌ/', ex:'cup', word:'cup'},
    {sym:'/ɒ/', ex:'hot', word:'hot'},
    {sym:'/ʊ/', ex:'book', word:'book'},
    {sym:'/ə/', ex:'about', word:'about'},
  ],
  longVowels: [
    {sym:'/iː/', ex:'see', word:'see'},
    {sym:'/ɑː/', ex:'car', word:'car'},
    {sym:'/ɔː/', ex:'door', word:'door'},
    {sym:'/uː/', ex:'too', word:'too'},
    {sym:'/ɜː/', ex:'bird', word:'bird'},
  ],
  diphthongs: [
    {sym:'/eɪ/', ex:'say', word:'say'},
    {sym:'/aɪ/', ex:'my', word:'my'},
    {sym:'/ɔɪ/', ex:'boy', word:'boy'},
    {sym:'/əʊ/', ex:'go', word:'go'},
    {sym:'/aʊ/', ex:'now', word:'now'},
    {sym:'/ɪə/', ex:'near', word:'near'},
    {sym:'/eə/', ex:'hair', word:'hair'},
    {sym:'/ʊə/', ex:'tour', word:'tour'},
  ],
  voicedConsonants: [
    {sym:'/b/', ex:'big', word:'big'},
    {sym:'/d/', ex:'dog', word:'dog'},
    {sym:'/g/', ex:'go', word:'go'},
    {sym:'/v/', ex:'very', word:'very'},
    {sym:'/ð/', ex:'this', word:'this'},
    {sym:'/z/', ex:'zoo', word:'zoo'},
    {sym:'/ʒ/', ex:'vision', word:'vision'},
    {sym:'/dʒ/', ex:'job', word:'job'},
    {sym:'/m/', ex:'man', word:'man'},
    {sym:'/n/', ex:'no', word:'no'},
    {sym:'/ŋ/', ex:'song', word:'song'},
    {sym:'/l/', ex:'love', word:'love'},
    {sym:'/r/', ex:'red', word:'red'},
    {sym:'/j/', ex:'yes', word:'yes'},
    {sym:'/w/', ex:'we', word:'we'},
  ],
  voicelessConsonants: [
    {sym:'/p/', ex:'pen', word:'pen'},
    {sym:'/t/', ex:'tea', word:'tea'},
    {sym:'/k/', ex:'key', word:'key'},
    {sym:'/f/', ex:'fish', word:'fish'},
    {sym:'/θ/', ex:'think', word:'think'},
    {sym:'/s/', ex:'sun', word:'sun'},
    {sym:'/ʃ/', ex:'she', word:'she'},
    {sym:'/tʃ/', ex:'chat', word:'chat'},
    {sym:'/h/', ex:'hat', word:'hat'},
  ],
};
const PHO_GROUPS = [
  {key:'shortVowels', label:'🔴 短元音 Short Vowels'},
  {key:'longVowels', label:'🟢 长元音 Long Vowels'},
  {key:'diphthongs', label:'🟡 双元音 Diphthongs'},
  {key:'voicedConsonants', label:'🔵 浊辅音 Voiced'},
  {key:'voicelessConsonants', label:'⚪ 清辅音 Voiceless'},
];

/* ═══════════════════════════════════════════
   DATA: Vocabulary (10 categories × ~20 words)
   ═══════════════════════════════════════════ */
const VOCAB = [
  {cat:'日常生活', icon:'🏠', words:[
    {en:'schedule', phon:'/ˈʃedjuːl/', zh:'日程安排'},
    {en:'appointment', phon:'/əˈpɔɪntmənt/', zh:'预约'},
    {en:'commute', phon:'/kəˈmjuːt/', zh:'通勤'},
    {en:'grocery', phon:'/ˈɡrəʊsəri/', zh:'杂货'},

        <h3>📖 字母表与发音</h3>
        <p>英语有<strong>26个字母</strong>，其中5个元音字母(a,e,i,o,u)，21个辅音字母。每个字母有字母名和字母音两种读法。</p>
        <p>元音字母在开音节中发字母本音（长音），在闭音节中发短音。例如：</p>
        <div class="example" onclick="app.speak('cake')"><div class="en">🔊 cake（开音节，a发/eɪ/）</div><div class="zh">蛋糕</div></div>

        <p><strong>关键概念：</strong>开音节 = 以元音字母结尾（如 go, she）；闭音节 = 以辅音字母结尾（如 cat, big）。</p>
        <div class="lesson-quiz"><div class="q-title">📝 小测试：下面哪个单词是开音节？</div>

      `},
      {id:'L1-2', title:'国际音标入门(上)', desc:'学习12个单元音音标', content:`
        <h3>📖 单元音 (Monophthongs)</h3>
        <p>单元音发音时舌位和口形不变。英语有12个单元音，分为短元音和长元音。</p>
        <p><strong>短元音（7个）：</strong>/ɪ/ /e/ /æ/ /ʌ/ /ɒ/ /ʊ/ /ə/</p>
        <p><strong>长元音（5个）：</strong>/iː/ /ɑː/ /ɔː/ /uː/ /ɜː/</p>
        <p>长元音发音时间比短元音长约<strong>2倍</strong>。注意长音符号"ː"。</p>
        <div class="example" onclick="app.speak('ship')"><div class="en">🔊 /ɪ/ — ship（短音）</div><div class="zh">船</div></div>
        <div class="example" onclick="app.speak('sheep')"><div class="en">🔊 /iː/ — sheep（长音）</div><div class="zh">羊</div></div>
        <p>🔑 <strong>最小对立体：</strong>ship/sheep, bit/beat, fill/feel — 仅靠元音长短区分！</p>

      {id:'L1-3', title:'国际音标入门(下)', desc:'学习8个双元音和辅音', content:`

/* ═══════════════════════════════════════════
   STORAGE
   ═══════════════════════════════════════════ */
const STORAGE_KEY = 'englearn_data';
function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return null;
}
function saveData(d){ localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
function getDefaultData(){
  return {
    level:1, xp:0, streak:0, lastStudyDate:'',
    completedLessons:[], reviewQueue:[], learnedWords:[],
    quizScores:[], studiedToday:false,
  };
}

/* ═══════════════════════════════════════════
   SPEECH
   ═══════════════════════════════════════════ */
function getEnglishVoice(){
  return new Promise((resolve)=>{
    const voices = speechSynthesis.getVoices();
    if(voices.length){
      const en = voices.find(v=>v.lang==='en-GB'&&v.name.includes('Female')) ||
                 voices.find(v=>v.lang==='en-GB') ||
                 voices.find(v=>v.lang==='en-US'&&v.name.includes('Female')) ||
                 voices.find(v=>v.lang.startsWith('en'));
      resolve(en || voices[0]);
    }else{
      speechSynthesis.onvoiceschanged = ()=>{
        const v2 = speechSynthesis.getVoices();
        const en2 = v2.find(v=>v.lang==='en-GB') || v2.find(v=>v.lang.startsWith('en'));
        resolve(en2 || v2[0]);
      };
    }
  });
}
async function speak(text){
  speechSynthesis.cancel();
  const voice = await getEnglishVoice();
  const u = new SpeechSynthesisUtterance(text);
  u.voice = voice; u.rate = 0.85; u.pitch = 1;
  u.lang = voice?.lang || 'en-GB';
  speechSynthesis.speak(u);
}

/* ═══════════════════════════════════════════
   SM-2 Algorithm
   ═══════════════════════════════════════════ */
function sm2Review(item, quality){
  // quality: 0=forgot, 1=hard, 2=good, 3=easy
  if(quality < 1){
    item.interval = 1;
    item.reps = 0;
  }else{
    if(item.reps === 0) item.interval = 1;
    else if(item.reps === 1) item.interval = 3;
    else item.interval = Math.round(item.interval * item.ef);
    item.reps++;
  }
  item.ef = Math.max(1.3, item.ef + (0.1 - (2 - quality) * (0.08 + (2 - quality) * 0.02)));
  item.nextReview = Date.now() + item.interval * 86400000;
  return item;
}

   APP

const app = {
  data: null,
  currentPage: 'home',
  vocabCat: 0,
  reviewIndex: 0,
  quizMode: 'match',
  quizState: null,
  phoMode: 'all', // 'all' | 'practice'
  phoPractice: null,

  init(){
    this.data = loadData() || getDefaultData();
    this.checkStreak();
    this.bindTabs();
    this.renderAll();
    // Preload voices
    speechSynthesis.getVoices();
    speechSynthesis.onvoiceschanged = ()=> speechSynthesis.getVoices();

    // Daily reminder at 8pm
    this.checkDailyReminder();
  },

  checkStreak(){
    const today = new Date().toISOString().slice(0,10);
    if(this.data.lastStudyDate === today) return;
    const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
    if(this.data.lastStudyDate === yesterday){
      this.data.streak++;
    }else if(this.data.lastStudyDate !== today){
      this.data.streak = 0;
    }
    this.data.lastStudyDate = today;
    this.data.studiedToday = false;
    saveData(this.data);
  },

  checkDailyReminder(){
    // Check if we should show a "welcome back" toast
    if(!this.data.studiedToday && this.data.streak > 0){
      setTimeout(()=>this.toast(`🔥 连续学习 ${this.data.streak} 天！继续加油！`), 500);
    }
  },

  markStudied(){
    if(!this.data.studiedToday){
      this.data.studiedToday = true;
      this.data.xp += 10;
      saveData(this.data);
      this.toast('+10 XP ✨');
      this.updateLevel();
      this.renderHome();
    }
  },

  addXP(amount){
    this.data.xp += amount;
    this.updateLevel();
    saveData(this.data);
    this.renderHome();
  },

  updateLevel(){
    const levels = [0,200,500,1000,2000,4000];
    let newLevel = 1;
    for(let i=levels.length-1;i>=0;i--){
      if(this.data.xp >= levels[i]){ newLevel = i+1; break; }
    }
    if(newLevel > this.data.level){
      this.data.level = newLevel;
      this.toast(`🎉 升级了！Lv.${newLevel} ${LESSONS[newLevel-1].name}`);
    }
  },

  getDueReviews(){
    const now = Date.now();
    return this.data.reviewQueue.filter(item => item.nextReview <= now + 3600000); // include items due within 1 hour
  },

  toast(msg){
    const existing = document.querySelector('.toast');
    if(existing) existing.remove();
    const el = document.createElement('div');
    el.className = 'toast'; el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(()=> el.remove(), 2000);
  },

  bindTabs(){
    document.querySelectorAll('.tab-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const page = btn.dataset.page;
        this.navTo(page);
      });
    });
  },

  navTo(page){
    this.currentPage = page;
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    const pageEl = document.getElementById('page-'+page);
    if(pageEl) pageEl.classList.add('active');
    const tabBtn = document.querySelector(`[data-page="${page}"]`);
    if(tabBtn) tabBtn.classList.add('active');

    if(page==='phonetics') this.renderPhonetics();
    if(page==='vocabulary') this.renderVocabulary();
    if(page==='lessons') this.renderLessons();
    if(page==='review') this.renderReview();
    if(page==='quiz') { this.quizState=null; this.startQuiz(); }
    if(page==='home') this.renderHome();

    // Scroll to top
    document.getElementById('app').scrollIntoView({behavior:'smooth'});
  },

  /* ── Home ─────────────────────── */
  renderHome(){
    const d = this.data;
    const levelCfg = LESSONS[d.level-1];
    const levels = [0,200,500,1000,2000,4000];
    const curXp = d.xp - (levels[d.level-1]||0);
    const nextXp = (levels[d.level]||99999) - (levels[d.level-1]||0);
    const pct = d.level >= 6 ? 100 : Math.min(100, Math.round(curXp / nextXp * 100));

    document.getElementById('home-level').textContent = `${levelCfg.name} Lv.${d.level}`;
    document.getElementById('home-streak').textContent = d.streak + ' 天';
    document.getElementById('home-xp').textContent = d.xp;
    document.getElementById('home-next').textContent = d.level >= 6 ? 'MAX' : (levels[d.level]||99999) + ' XP';
    document.getElementById('home-progress').style.width = pct + '%';
    document.getElementById('home-due').textContent = this.getDueReviews().length;
    document.getElementById('home-words').textContent = d.learnedWords.length;
    document.getElementById('home-lessons').textContent = d.completedLessons.length;

    // Update review badge
    const due = this.getDueReviews().length;
    const badge = document.getElementById('review-badge');
    if(due > 0){ badge.style.display='flex'; badge.textContent = due; }
    else badge.style.display = 'none';
  },

  /* ── Phonetics ────────────────── */
  showPhonetics(mode){
    this.phoMode = mode;
    document.getElementById('pho-btn-all').className = mode==='all' ? 'btn btn-sm btn-pri' : 'btn btn-sm btn-outline';
    document.getElementById('pho-btn-practice').className = mode==='practice' ? 'btn btn-sm btn-pri' : 'btn btn-sm btn-outline';
    this.renderPhonetics();
  },

  renderPhonetics(){
    const container = document.getElementById('phonetics-content');
    const practiceEl = document.getElementById('phonetics-practice');

    if(this.phoMode === 'practice'){
      container.style.display = 'none';
      practiceEl.style.display = 'block';
      this.startPhoneticsPractice();
      return;
    }

    container.style.display = 'block';
    practiceEl.style.display = 'none';

    let html = '';
    PHO_GROUPS.forEach(group=>{
      const phonemes = PHONEMES[group.key];
      html += `<div class="section-title">${group.label}</div>`;
      html += `<div class="phoneme-grid">`;
      phonemes.forEach(p=>{
        html += `<div class="phoneme-card" onclick="app.playPhoneme('${p.word}','${p.sym}',this)">
          <div class="sym">${p.sym}</div>
          <div class="ex">${p.ex}</div>
        </div>`;
      });
      html += `</div>`;
    });
    container.innerHTML = html;
    this.markStudied();
  },

  async playPhoneme(word, sym, el){
    el.classList.add('playing');
    setTimeout(()=>el.classList.remove('playing'), 600);
    await speak(word);
  },

  startPhoneticsPractice(){
    const el = document.getElementById('phonetics-practice');
    // Pick random phoneme
    const allPhonemes = [];
    PHO_GROUPS.forEach(g=>{ allPhonemes.push(...PHONEMES[g.key]); });
    const target = allPhonemes[Math.floor(Math.random()*allPhonemes.length)];

    // Pick 3 distractors
    const others = allPhonemes.filter(p=>p.sym!==target.sym);
    const distractors = [];
    while(distractors.length < 3){
      const r = others[Math.floor(Math.random()*others.length)];
      if(!distractors.find(d=>d.sym===r.sym)) distractors.push(r);
    }

    const options = [target, ...distractors].sort(()=>Math.random()-0.5);
    this.phoPractice = {target, options};

    el.innerHTML = `
      <div class="card" style="text-align:center">
        <p style="font-size:1rem;color:var(--text2);margin-bottom:12px">👂 听发音，选择对应的音标</p>
        <button class="btn btn-pri" onclick="speak('${target.word}')" style="margin-bottom:16px">🔊 播放发音</button>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          ${options.map((o,i)=>`
            <button class="quiz-opt" style="font-size:1.2rem;font-family:Georgia,serif" onclick="app.answerPhonetics('${o.sym}',this)">${o.sym}<br><small style="font-size:.65rem;color:var(--text2)">${o.ex}</small></button>
          `).join('')}
        </div>
        <p id="pho-result" style="margin-top:12px;font-weight:600;min-height:24px"></p>
        <button class="btn btn-sm btn-outline" onclick="app.startPhoneticsPractice()" style="margin-top:8px">下一题 →</button>
      </div>
    `;
    // Auto play
    setTimeout(()=>speak(target.word), 300);
  },

  answerPhonetics(sym, btn){
    const correct = sym === this.phoPractice.target.sym;
    const resultEl = document.getElementById('pho-result');
    if(correct){
      btn.classList.add('correct');
      resultEl.innerHTML = '<span style="color:var(--success)">✅ 正确！</span>';
      this.addXP(5);
    }else{
      btn.classList.add('wrong');
      resultEl.innerHTML = `<span style="color:var(--danger)">❌ 正确答案是 ${this.phoPractice.target.sym}</span>`;
      // Highlight correct
      btn.parentElement.querySelectorAll('.quiz-opt').forEach(b=>{
        if(b.textContent.includes(this.phoPractice.target.sym)) b.classList.add('correct');
      });
    }
    btn.parentElement.querySelectorAll('.quiz-opt').forEach(b=>b.style.pointerEvents='none');
  },

  /* ── Vocabulary ────────────────── */
  renderVocabulary(){
    // Category chips
    const catEl = document.getElementById('vocab-cats');
    catEl.innerHTML = VOCAB.map((c,i)=>`
      <span class="cat-chip ${i===this.vocabCat?'active':''}" onclick="app.selectVocabCat(${i})">${c.icon} ${c.cat}</span>
    `).join('');

    this.renderVocabWords();
    this.markStudied();
  },

  selectVocabCat(i){
    this.vocabCat = i;
    this.renderVocabulary();
  },

  renderVocabWords(){
    const cat = VOCAB[this.vocabCat];
    const wordsEl = document.getElementById('vocab-words');
    const learned = new Set(this.data.learnedWords);
    wordsEl.innerHTML = `
      <div class="section-title">${cat.icon} ${cat.cat}</div>
      ${cat.words.map((w,i)=>{
        const isLearned = learned.has(w.en);
        return `<div class="word-card" onclick="app.tapWord('${w.en}','${w.phon}',this)" data-word="${w.en}">
          <span class="spk">🔊</span>
          <span class="eng">${w.en}</span>
          <span class="phon">${w.phon}</span>
          ${isLearned ? '<span class="added">✓</span>' : ''}
          <span class="chn">${w.zh}</span>
        </div>`;
      }).join('')}
    `;
  },

  async tapWord(word, phon, el){
    await speak(word);
    // Add to learned if not already
    if(!this.data.learnedWords.includes(word)){
      this.data.learnedWords.push(word);
      // Add to review queue
      const exists = this.data.reviewQueue.find(r=>r.word===word);
      if(!exists){
        this.data.reviewQueue.push({
          word, phon,
          meaning: el.querySelector('.chn')?.textContent||'',
          nextReview: Date.now() + 86400000, // review tomorrow
          interval: 1, reps: 0, ef: 2.5,
        });
      }
      saveData(this.data);
      el.querySelector('.spk')?.insertAdjacentHTML('afterend','<span class="added">✓</span>');
      this.addXP(5);
      this.renderHome();
    }
  },

  /* ── Lessons ───────────────────── */
  renderLessons(){
    const d = this.data;
    const el = document.getElementById('lessons-list');
    let html = '';

    LESSONS.forEach((level, li)=>{
      const isUnlocked = d.xp >= level.xpRequired;
      const allDone = level.lessons.every(l=>d.completedLessons.includes(l.id));

      html += `<div class="level-header">
        <div class="level-icon ${!isUnlocked?'locked':allDone?'done':'current'}">${level.icon}</div>
        <div>
          <div style="font-weight:700">${level.name} <span style="font-size:.75rem;color:var(--text2)">Lv.${li+1}</span></div>
          <div style="font-size:.72rem;color:var(--text2)}">需 ${level.xpRequired} XP ${isUnlocked?'✅ 已解锁':'🔒 未解锁'}</div>
        </div>
      </div>`;

      level.lessons.forEach((lesson, i)=>{
        const isDone = d.completedLessons.includes(lesson.id);
        // Can do this lesson if level unlocked and previous lesson done (or it's the first)
        const prevDone = i===0 || d.completedLessons.includes(level.lessons[i-1].id);
        const canDo = isUnlocked && (prevDone || isDone);

        html += `<div class="lesson-item ${!canDo?'locked':''}" onclick="${canDo?`app.openLesson('${lesson.id}',${li},${i})`:'app.toast(\'🔒 请先完成前面的课程\')'}">
          <div class="idx ${isDone?'done':canDo?'current':'locked'}">${isDone?'✓':i+1}</div>
          <div class="info">
            <div class="title">${lesson.title}</div>
            <div class="desc">${lesson.desc}</div>
          </div>
          <span style="color:var(--text2)">${isDone?'✅':canDo?'▶':'🔒'}</span>
        </div>`;
      });
    });

    el.innerHTML = html;
    this.markStudied();
  },

  openLesson(lessonId, levelIdx, lessonIdx){
    const level = LESSONS[levelIdx];
    const lesson = level.lessons[lessonIdx];

    document.getElementById('modal-title').textContent = lesson.title;
    document.getElementById('modal-body').innerHTML = lesson.content;
    document.getElementById('lesson-modal').classList.add('active');
    document.getElementById('lesson-modal').dataset.lessonId = lessonId;
    document.getElementById('lesson-modal').dataset.levelIdx = levelIdx;

    // Scroll to top
    document.getElementById('lesson-modal').scrollTop = 0;
    this.markStudied();
  },

  closeLesson(){
    document.getElementById('lesson-modal').classList.remove('active');
    speechSynthesis.cancel();
  },

  checkLessonQuiz(el){
    const parent = el.parentElement;
    const allOpts = parent.querySelectorAll('.q-opt');
    if(parent.dataset.answered) return;
    parent.dataset.answered = 'true';

    const isCorrect = el.dataset.correct === 'true';
    if(isCorrect){
      el.classList.add('correct');
      this.addXP(15);
      // Mark lesson as completed
      const modal = document.getElementById('lesson-modal');
      const lessonId = modal.dataset.lessonId;
      if(lessonId && !this.data.completedLessons.includes(lessonId)){
        this.data.completedLessons.push(lessonId);
        saveData(this.data);
        this.toast('🎉 课程完成！+15 XP');
      }
    }else{
      el.classList.add('wrong');
      allOpts.forEach(o=>{ if(o.dataset.correct==='true') o.classList.add('correct'); });
    }
    allOpts.forEach(o=>o.style.pointerEvents='none');
  },

  /* ── Review ────────────────────── */
  renderReview(){
    const el = document.getElementById('review-content');
    const due = this.getDueReviews();

    if(due.length === 0){
      el.innerHTML = `
        <div class="empty-state">
          <div class="emoji">🎉</div>
          <p>今日没有待复习的内容</p>
          <p style="font-size:.8rem;color:var(--text2)">去学习新单词来充实复习队列吧</p>
          <button class="btn btn-pri" onclick="app.navTo('vocabulary')" style="margin-top:12px">📚 去学单词</button>
        </div>
      `;
      return;
    }

    this.reviewIndex = 0;
    this.renderFlashcard(due);
    this.markStudied();
  },

  renderFlashcard(due){
    const el = document.getElementById('review-content');
    if(this.reviewIndex >= due.length){
      el.innerHTML = `
        <div class="empty-state">
          <div class="emoji">🏆</div>
          <p>本轮复习完成！</p>
          <p style="font-size:.8rem;color:var(--text2)">今天又进步了一点点</p>
          <button class="btn btn-pri" onclick="app.navTo('home')" style="margin-top:12px">🏠 返回首页</button>
        </div>
      `;
      this.renderHome();
      return;
    }

    const item = due[this.reviewIndex];
    el.innerHTML = `
      <p style="text-align:center;color:var(--text2);font-size:.8rem;margin-bottom:8px">${this.reviewIndex+1} / ${due.length} · 点击翻转</p>
      <div class="flashcard" id="flashcard" onclick="app.flipCard()">
        <div class="front">
          <div class="word">${item.word}</div>
          <div class="phonetic">${item.phon||''}</div>
          <div class="hint">👆 点击查看释义</div>
        </div>
      </div>
      <div class="rating-btns" id="rating-btns" style="display:none">
        <button class="rating-btn r0" onclick="app.rateCard(0)"><span class="emoji">😰</span>忘记了</button>
        <button class="rating-btn r1" onclick="app.rateCard(1)"><span class="emoji">🤔</span>困难</button>
        <button class="rating-btn r2" onclick="app.rateCard(2)"><span class="emoji">😊</span>良好</button>
        <button class="rating-btn r3" onclick="app.rateCard(3)"><span class="emoji">🚀</span>简单</button>
      </div>
    `;
  },

  flipCard(){
    const card = document.getElementById('flashcard');
    if(!card || card.dataset.flipped) return;
    card.dataset.flipped = 'true';

    const due = this.getDueReviews();
    const item = due[this.reviewIndex];

    card.innerHTML = `
      <div class="back">
        <div class="meaning">${item.meaning}</div>
        <div class="phonetic">${item.phon||''}</div>
        <button class="btn btn-sm btn-outline" onclick="event.stopPropagation();speak('${item.word}')" style="margin-top:10px">🔊 听发音</button>
      </div>
    `;
    document.getElementById('rating-btns').style.display = 'grid';
  },

  rateCard(quality){
    const due = this.getDueReviews();
    const item = due[this.reviewIndex];
    const idx = this.data.reviewQueue.findIndex(r=>r.word===item.word);
    if(idx >= 0){
      this.data.reviewQueue[idx] = sm2Review(this.data.reviewQueue[idx], quality);
      saveData(this.data);
    }
    this.addXP(3);
    this.reviewIndex++;
    this.renderFlashcard(due);
  },

  /* ── Quiz ──────────────────────── */
  startQuiz(){
    const el = document.getElementById('quiz-content');
    // Update active tab
    document.querySelectorAll('.quiz-type-btn').forEach(b=>{
      b.classList.remove('active');
      if((b.textContent.includes('释义')&&this.quizMode==='match')||
         (b.textContent.includes('听音')&&this.quizMode==='listen')||
         (b.textContent.includes('选词')&&this.quizMode==='fill')){
        b.classList.add('active');
      }
    });

    if(this.quizMode === 'match') this.startMatchQuiz();
    else if(this.quizMode === 'listen') this.startListenQuiz();
    else if(this.quizMode === 'fill') this.startFillQuiz();
    this.markStudied();
  },

  startMatchQuiz(){
    // Pick 5 random words from vocab
    const allWords = [];
    VOCAB.forEach(c=>allWords.push(...c.words));
    const shuffled = [...allWords].sort(()=>Math.random()-0.5);
    const pool = shuffled.slice(0,5);

    this.quizState = {
      type:'match', words:pool,
      selectedEn: null,
      matched: {},
      score:0, total:5,
    };

    const enShuffled = [...pool].sort(()=>Math.random()-0.5);
    const zhShuffled = [...pool].sort(()=>Math.random()-0.5);

    document.getElementById('quiz-content').innerHTML = `
      <div class="quiz-card">
        <div class="question">🔤 点击英文单词，再点击对应中文释义（${0}/5）</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div>
            <div style="font-weight:600;margin-bottom:6px;font-size:.8rem;color:var(--text2)">English</div>
            ${enShuffled.map(w=>`
              <div class="quiz-opt match-en" data-word="${w.en}" onclick="app.matchSelectEn('${w.en}',this)" style="margin-bottom:6px">${w.en}</div>
            `).join('')}
          </div>
          <div>
            <div style="font-weight:600;margin-bottom:6px;font-size:.8rem;color:var(--text2)">中文</div>
            ${zhShuffled.map(w=>`
              <div class="quiz-opt match-zh" data-word="${w.en}" onclick="app.matchSelectZh('${w.en}',this)" style="margin-bottom:6px">${w.zh}</div>
            `).join('')}
          </div>
        </div>
        <button class="btn btn-sm btn-outline" onclick="app.startMatchQuiz()" style="margin-top:12px;width:100%">🔄 换一组</button>
      </div>
    `;
  },

  matchSelectEn(word, el){
    document.querySelectorAll('.match-en').forEach(e=>e.style.outline='none');
    el.style.outline = '2px solid var(--pri)';
    this.quizState.selectedEn = word;
  },

  matchSelectZh(word, el){
    const state = this.quizState;
    if(!state.selectedEn) return;
    if(state.matched[state.selectedEn]) return;

    const enEl = document.querySelector(`.match-en[data-word="${state.selectedEn}"]`);
    const zhEl = document.querySelector(`.match-zh[data-word="${word}"]`);

    if(state.selectedEn === word){
      // Correct match!
      state.matched[word] = true;
      state.score++;
      enEl.classList.add('correct'); enEl.style.outline='none';
      zhEl.classList.add('correct');
      this.addXP(5);

      document.querySelector('.quiz-card .question').textContent =
        `🔤 点击英文单词，再点击对应中文释义（${state.score}/5）`;

      if(state.score >= state.total){
        setTimeout(()=>{
          document.getElementById('quiz-content').innerHTML += `
            <div style="text-align:center;margin-top:16px">
              <div class="quiz-score">🏆 全部正确！</div>
              <button class="btn btn-pri" onclick="app.startMatchQuiz()">再来一组</button>
            </div>
          `;
          this.addXP(20);
        }, 500);
      }
    }else{
      enEl.style.outline='2px solid var(--danger)';
      setTimeout(()=>{ enEl.style.outline='none'; }, 500);
    }
    state.selectedEn = null;
  },

  startListenQuiz(){
    const allWords = [];
    VOCAB.forEach(c=>allWords.push(...c.words));
    const target = allWords[Math.floor(Math.random()*allWords.length)];
    const others = allWords.filter(w=>w.en!==target.en);
    const distractors = [];
    while(distractors.length < 3){
      const r = others[Math.floor(Math.random()*others.length)];
      if(!distractors.find(d=>d.en===r.en)) distractors.push(r);
    }

    this.quizState = { type:'listen', target, options:[target,...distractors].sort(()=>Math.random()-0.5), answered:false };

    document.getElementById('quiz-content').innerHTML = `
      <div class="quiz-card" style="text-align:center">
        <div class="question">👂 听发音，选择正确的单词</div>
        <button class="btn btn-pri" onclick="speak('${target.en}')" style="margin:12px 0">🔊 播放发音</button>
        <div class="quiz-options">
          ${this.quizState.options.map(w=>`
            <div class="quiz-opt" onclick="app.answerListen('${w.en}',this)">${w.en} <span style="font-size:.7rem;color:var(--text2)">${w.phon}</span></div>
          `).join('')}
        </div>
        <p id="listen-result" style="margin-top:12px;font-weight:600;min-height:24px"></p>
        <button class="btn btn-sm btn-outline" onclick="app.startListenQuiz()" style="margin-top:8px">下一题 →</button>
      </div>
    `;
    // Auto play
    setTimeout(()=>speak(target.en), 500);
  },

  answerListen(word, btn){
    if(this.quizState.answered) return;
    this.quizState.answered = true;
    const correct = word === this.quizState.target.en;
    const resultEl = document.getElementById('listen-result');
    if(correct){
      btn.classList.add('correct');
      resultEl.innerHTML = '<span style="color:var(--success)">✅ 正确！</span>';
      this.addXP(10);
    }else{
      btn.classList.add('wrong');
      resultEl.innerHTML = `<span style="color:var(--danger)">❌ 正确答案：${this.quizState.target.en}</span>`;
      btn.parentElement.querySelectorAll('.quiz-opt').forEach(b=>{
        if(b.textContent.startsWith(this.quizState.target.en)) b.classList.add('correct');
      });
    }
    btn.parentElement.querySelectorAll('.quiz-opt').forEach(b=>b.style.pointerEvents='none');
  },

  startFillQuiz(){
    const q = FILL_SENTENCES[Math.floor(Math.random()*FILL_SENTENCES.length)];
    this.quizState = { type:'fill', answer:q.a, answered:false };

    document.getElementById('quiz-content').innerHTML = `
      <div class="quiz-card">
        <div class="question">✏️ 选择合适的单词填空</div>
        <p style="font-size:1.05rem;margin:16px 0;padding:14px;background:var(--pri-light);border-radius:var(--radius-sm);line-height:1.8">
          ${q.s.replace('___','<strong style="border-bottom:2px solid var(--pri);padding:0 8px">___</strong>')}
        </p>
        <p style="font-size:.75rem;color:var(--text2);margin-bottom:12px">点击单词选择</p>
        <div class="quiz-options">
          ${q.opts.map(o=>`
            <div class="quiz-opt" onclick="app.answerFill('${o}',this)">${o}</div>
          `).join('')}
        </div>
        <p id="fill-result" style="margin-top:12px;font-weight:600;min-height:24px;text-align:center"></p>
        <button class="btn btn-sm btn-outline" onclick="app.startFillQuiz()" style="margin-top:8px;width:100%">下一题 →</button>
      </div>
    `;
  },

  answerFill(word, btn){
    if(this.quizState.answered) return;
    this.quizState.answered = true;
    const correct = word === this.quizState.answer;
    const resultEl = document.getElementById('fill-result');
    if(correct){
      btn.classList.add('correct');
      resultEl.innerHTML = '<span style="color:var(--success)">✅ 正确！</span>';
      this.addXP(10);
    }else{
      btn.classList.add('wrong');
      resultEl.innerHTML = `<span style="color:var(--danger)">❌ 正确答案：${this.quizState.answer}</span>`;
      btn.parentElement.querySelectorAll('.quiz-opt').forEach(b=>{
        if(b.textContent===this.quizState.answer) b.classList.add('correct');
      });
    }
    btn.parentElement.querySelectorAll('.quiz-opt').forEach(b=>b.style.pointerEvents='none');
  },

  renderAll(){
    this.renderHome();
  },
};

/* ═══════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════ */
app.init();
</script>
</body>
</html>
